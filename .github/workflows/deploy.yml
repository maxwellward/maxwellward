name: Build new Docker image

on:
  push:
    branches:
      - main  # Change if needed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 'Create env files'
        run: |
          touch frontend/.env
          echo PUBLIC_ENVIRONMENT="${{ vars.ENVIRONMENT }}" >> frontend/.env
          echo PUBLIC_BACKEND_URL="${{ vars.BACKEND_URL }}" >> frontend/.env
          echo PUBLIC_FIREBASE_API_KEY="${{ vars.FIREBASE_API_KEY }}" >> frontend/.env
          echo PUBLIC_FIREBASE_AUTH_DOMAIN="${{ vars.FIREBASE_AUTH_DOMAIN }}" >> frontend/.env
          echo PUBLIC_FIREBASE_PROJECT_ID="${{ vars.FIREBASE_PROJECT_ID }}" >> frontend/.env
          echo PUBLIC_FIREBASE_APP_ID="${{ vars.FIREBASE_APP_ID }}" >> frontend/.env
          touch backend/.env
          echo MEDIA_DIR="${{ vars.MEDIA_DIRECTORY }}" >> backend/.env

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Build and push frontend Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ secrets.GHCR_USERNAME }}/portfolio:latest
          docker build -t $IMAGE_NAME ./frontend
          docker push $IMAGE_NAME
      
      - name: Build and push backend Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ secrets.GHCR_USERNAME }}/portfolio-image-api:latest
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME